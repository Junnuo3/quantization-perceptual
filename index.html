<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantization Perceptual Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }

    .example {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .example-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 1rem;
      border-bottom: 2px solid #eee;
      padding-bottom: 0.75rem;
    }

    .example-header h2 {
      font-size: 1.2rem;
    }

    .example-id {
      font-size: 0.75rem;
      color: #888;
      font-family: monospace;
    }

    .original-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
      background: #f0f7ff;
      border: 1px solid #c8dff8;
      border-radius: 6px;
      padding: 0.6rem 1rem;
    }

    .original-row label {
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      color: #2255aa;
    }

    .quant-sections {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    @media (max-width: 640px) {
      .quant-sections { grid-template-columns: 1fr; }
    }

    .quant-section {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 0.85rem;
    }

    .quant-section h3 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #eee;
      color: #333;
    }

    .audio-item {
      margin-bottom: 0.65rem;
    }

    .audio-item:last-child {
      margin-bottom: 0;
    }

    .audio-label {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 0.2rem;
      font-weight: 500;
    }

    audio {
      width: 100%;
      height: 32px;
    }
  </style>
</head>
<body>

<h1>Quantization Perceptual Comparison</h1>

<script>
  const examples = [
    "05f21994c71a5f881e64f45c8d706165",
    "1d9d16a9da90c090809c153754823c2b",
    "5dd29e99ed7bd3cc0c5177a6e9de22ea",
    "b97c529ab9ef783a849b896816001748",
    "dac3cdd0db6341d8dc14641e44ed0d44"
  ];

  const sections = [
    {
      key: "duration",
      label: "Duration Quantization",
      files: [
        { name: "1 ms",  file: "duration_1ms.wav" },
        { name: "2 ms",  file: "duration_2ms.wav" },
        { name: "5 ms",  file: "duration_5ms.wav" },
        { name: "10 ms", file: "duration_10ms.wav" },
        { name: "20 ms", file: "duration_20ms.wav" }
      ]
    },
    {
      key: "onset",
      label: "Onset Quantization",
      files: [
        { name: "1 ms",  file: "onset_1ms.wav" },
        { name: "2 ms",  file: "onset_2ms.wav" },
        { name: "5 ms",  file: "onset_5ms.wav" },
        { name: "10 ms", file: "onset_10ms.wav" },
        { name: "20 ms", file: "onset_20ms.wav" }
      ]
    },
    {
      key: "velocity",
      label: "Velocity Quantization",
      files: [
        { name: "8 bins",   file: "velocity_8bins.wav" },
        { name: "16 bins",  file: "velocity_16bins.wav" },
        { name: "32 bins",  file: "velocity_32bins.wav" },
        { name: "64 bins",  file: "velocity_64bins.wav" },
        { name: "128 bins", file: "velocity_128bins.wav" }
      ]
    }
  ];

  function audioItem(src, label) {
    return `<div class="audio-item">
      <div class="audio-label">${label}</div>
      <audio controls preload="none">
        <source src="${src}" type="audio/wav">
      </audio>
    </div>`;
  }

  examples.forEach((id, idx) => {
    const base = `audio/${id}`;
    const num = idx + 1;

    const quantHTML = sections.map(sec => {
      const items = sec.files.map(f => audioItem(`${base}/${f.file}`, f.name)).join("\n");
      return `<div class="quant-section">
        <h3>${sec.label}</h3>
        ${items}
      </div>`;
    }).join("\n");

    document.write(`
    <div class="example">
      <div class="example-header">
        <h2>Example ${num}</h2>
        <span class="example-id">${id}</span>
      </div>
      <div class="original-row">
        <label>Original</label>
        <audio controls preload="none" style="flex:1">
          <source src="${base}/original.wav" type="audio/wav">
        </audio>
      </div>
      <div class="quant-sections">
        ${quantHTML}
      </div>
    </div>`);
  });
</script>

</body>
</html>
